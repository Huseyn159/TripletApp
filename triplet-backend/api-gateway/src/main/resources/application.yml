server:
  port: 8080 # Bütün dünya bu portu tanıyacaq

spring:
  application:
    name: gateway-service
  cloud:
    gateway:

      routes:
        # Auth Service-ə gedən yol
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**


        # Trip Service-ə gedən yol
        - id: trip-service
          uri: lb://TRIP-SERVICE
          predicates:
            - Path=/api/v1/trips/**
          filters:

            - AuthenticationFilter


springdoc:
  swagger-ui:
    # Bu hissə Swagger-in yuxarı sağ küncündə seçim menyusu yaradacaq
    urls:
      - name: 🔐 Auth Service
        url: /api/v1/auth/v3/api-docs
      - name: ✈️ Trip Service
        url: /api/v1/trips/v3/api-docs
    # Gateway-in öz Swagger-i deyil, servislərin Swagger-i önəmlidir
    display-query-params-email: true

